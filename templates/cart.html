<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>购物车 - {{PROJECT_NAME}}</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="header">
        <div class="container header-content">
            <h1>购物车 ({{CART_COUNT}})</h1>
            <span class="edit-btn" id="editBtn" onclick="toggleEditMode()">管理</span>
        </div>
    </header>

    <!-- 购物车内容 -->
    <main class="cart-content">
        <div class="container">
            {{CART_SHOPS}}
        </div>
        
        <!-- 为你推荐 -->
        <section class="recommend-section">
            <div class="section-header">
                <h3>💡 为你推荐</h3>
            </div>
            <div class="product-grid">
                {{RECOMMEND_PRODUCTS}}
            </div>
        </section>
    </main>

    <!-- 底部结算栏 -->
    <div class="cart-footer">
        <div class="container">
            <div class="footer-left">
                <label class="select-all" onclick="toggleSelectAll()">
                    <input type="checkbox" id="selectAll" {{SELECT_ALL_CHECKED}}>
                    <span>全选</span>
                </label>
            </div>
            <div class="footer-right">
                <div class="total-info">
                    <span>合计:</span>
                    <span class="total-price">¥{{TOTAL_PRICE}}</span>
                </div>
                <button class="btn-settle" onclick="goCheckout()">结算({{SELECTED_COUNT}})</button>
            </div>
        </div>
    </div>

    <!-- 删除确认弹窗 -->
    <div class="modal" id="deleteModal">
        <div class="modal-mask"></div>
        <div class="modal-content confirm-modal">
            <div class="confirm-text">确定要删除这个商品吗？</div>
            <div class="confirm-buttons">
                <button class="btn-cancel" onclick="closeDeleteModal()">取消</button>
                <button class="btn-confirm" onclick="confirmDelete()">确定</button>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
